name: CI DF Tratores

# Define que o robô vai rodar sempre que houver um Push ou Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # O robô vai usar um computador Linux virtual

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.13"

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar Linting (Análise Estática de Estilo)
      run: |
        pip install flake8
        # O flake8 verifica se o código segue o padrão PEP8
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Rodar Testes Automatizados
      run: |
        python -m pytest