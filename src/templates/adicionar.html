<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DF Tratores - Cadastrar Peça</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-df-yellow { background-color: #f7d117; }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar mais limpa -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-900" href="#">
                <!-- Aqui você pode trocar o texto por <img src="logo.png"> depois -->
                <span class="text-warning">DF</span> TRATORES
            </a>
            <div class="ms-auto">
                <span class="text-white-50">Atendimento à distância</span>
            </div>
        </div>

        <div class="container">
            <a class="navbar-brand fw-900" href="{{ url_for('home') }}">
                <span class="text-warning">DF</span> TRATORES
            </a>
            
            <div class="ms-auto">
                <a href="{{ url_for('adicionar_peca') }}" class="btn btn-outline-warning btn-sm fw-bold">
                    + Cadastrar Peça (ADM)
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-df-yellow text-dark fw-bold">Cadastrar Nova Peça</div>
                    <div class="card-body">
                        <form action="/adicionar" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Nome da Peça</label>
                                <input type="text" name="nome" class="form-control" required placeholder="Ex: Filtro de Óleo">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoria</label>
                                <select name="categoria" class="form-select">
                                    <option value="Motores">Motores</option>
                                    <option value="Hidráulica">Hidráulica</option>
                                    <option value="Transmissão">Transmissão</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Preço (R$)</label>
                                <input type="number" step="0.01" name="preco" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Foto da Peça</label>
                                <input type="file" name="imagem" class="form-control" accept="image/*">
                                <small class="text-muted">Use fotos nítidas da DF Tratores.</small>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark">Salvar no Catálogo</button>
                                <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
