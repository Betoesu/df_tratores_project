<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DF Tratores - Catálogo Profissional</title>
    <!-- Google Fonts: Inter para um ar moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-df-yellow { background-color: #f7d117; }
        
        /* Seção Hero com imagem de fundo minimalista */
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1530268576403-33927690f05e?q=80&w=2070&auto=format&fit=crop'); /* Imagem de trator minimalista */
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
        }

        .navbar-brand img { height: 40px; } /* Ajuste para sua logo depois */
        .card { border: none; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .btn-dark { background-color: #000; border: none; font-weight: bold; }
        .btn-dark:hover { background-color: #f7d117; color: #000; }
    </style>
</head>
<body>

    <!-- Navbar mais limpa -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-900" href="#">
                <!-- Aqui você pode trocar o texto por <img src="logo.png"> depois -->
                <span class="text-warning">DF</span> TRATORES
            </a>
            <div class="ms-auto">
                <span class="text-white-50">Atendimento à distância</span>
            </div>
        </div>
    </nav>

    <!-- Hero Section: O impacto visual -->
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-bolder mb-3">CATÁLOGO DE PEÇAS</h1>
            <p class="lead mb-4">Soluções rápidas para quem não pode parar no campo.</p>
            <a href="#catalogo" class="btn btn-warning btn-lg px-5 fw-bold text-dark">Ver Peças Disponíveis</a>
        </div>
    </header>

    <main class="container my-5" id="catalogo">
        <div class="row">
            {% for peca in produtos %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100">
                    <!-- Placeholder para foto da peça -->
                    <div class="bg-light text-center py-4">
                        <span style="font-size: 3rem;">⚙️</span>
                    </div>
                    <div class="card-body">
                        <h5 class="fw-bold mb-1">{{ peca.nome }}</h5>
                        <small class="text-muted d-block mb-3">{{ peca.categoria }}</small>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="h5 mb-0">R$ {{ peca.preco }}</span>
                            <a href="#" class="btn btn-sm btn-dark">Solicitar</a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <footer class="bg-dark text-white py-4 text-center">
        <p class="mb-0">© 2026 DF Tratores - Qualidade em cada engrenagem.</p>
    </footer>

</body>
</html>
